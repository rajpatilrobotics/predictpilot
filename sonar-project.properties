sonar.sources=src
sonar.tests=src/tests,e2e
sonar.exclusions=dist/**,node_modules/**,playwright-report/**,test-results/**,coverage/**,.vercel/**
sonar.test.inclusions=src/tests/**/*.ts,src/tests/**/*.tsx,e2e/**/*.ts

# Keep tests in analysis, but do not fail CPD for intentionally repeated fixtures.
sonar.cpd.exclusions=src/tests/**/*.ts,src/tests/**/*.tsx,e2e/**/*.ts,src/app/routes.ts
