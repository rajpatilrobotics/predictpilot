name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.3 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Production dependency audit
        run: pnpm audit --prod

      - name: Secret and wallet artifact scan
        run: |
          matches="$(
            find . \
              \( -name '.env.local' \
              -o -name '.env.test' \
              -o -name 'storageState.json' \
              -o -iname '*private*key*' \
              -o -iname '*seed*phrase*' \
              -o -iname '*mnemonic*' \
              -o -iname '*wallet*backup*' \
              -o -iname '*keystore*' \
              -o -iname '*cookie*' \) \
              -not -path './node_modules/*' \
              -not -path './.git/*' \
              -not -path './dist/*' \
              -not -path './playwright-report/*' \
              -not -path './test-results/*' \
              -print
          )"
          if [ -n "$matches" ]; then
            echo "Forbidden secret/auth/wallet artifacts found:"
            echo "$matches"
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Integration tests
        run: pnpm test:integration

      - name: PTB tests
        run: pnpm test:ptb

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright smoke tests
        run: pnpm test:e2e
